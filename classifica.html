<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classifica – Indovina il Brand!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary:      #1A1A2E;
            --accent:       #F7C948;
            --accent-dark:  #E0A800;
            --success:      #22C55E;
            --bg:           #F2F2F7;
            --surface:      #FFFFFF;
            --surface-2:    #F8F8FC;
            --text:         #1A1A2E;
            --text-muted:   #6E6E8A;
            --border:       #E2E2ED;
            --r-sm:  8px;
            --r-md:  14px;
            --r-lg:  22px;
            --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
        }

        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 24px 60px;
            color: var(--text);
        }

        .lb-card {
            background: var(--surface);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-lg);
            border-top: 6px solid var(--primary);
            padding: 44px 40px;
            width: 100%;
            max-width: 560px;
            animation: fadeUp .3s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .lb-header { text-align: center; margin-bottom: 32px; }
        .lb-emoji  { font-size: 3.2rem; display: block; margin-bottom: 10px; }
        .lb-title  {
            font-size: clamp(1.8rem, 6vw, 2.4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .lb-sub { color: var(--text-muted); font-size: .88rem; }

        /* Stats top */
        .lb-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .lb-stat {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 12px 8px;
            text-align: center;
        }
        .lb-stat-val { font-weight: 900; font-size: 1.5rem; color: var(--primary); }
        .lb-stat-lbl { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-top: 2px; }

        /* Lista */
        .lb-list {
            list-style: none;
            margin-bottom: 28px;
        }

        .lb-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--r-sm);
            margin-bottom: 6px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            transition: background .15s;
        }

        /* Top 3 con bordo accento */
        .lb-item.top-1 { border-color: #FFD700; background: #FFFDF0; }
        .lb-item.top-2 { border-color: #C0C0C0; background: #F8F8F8; }
        .lb-item.top-3 { border-color: #CD7F32; background: #FFF8F3; }

        .lb-rank {
            font-weight: 900;
            font-size: 1rem;
            color: var(--text-muted);
            width: 30px;
            text-align: center;
            flex-shrink: 0;
        }

        .lb-info { flex: 1; min-width: 0; }
        .lb-name  {
            font-weight: 700;
            font-size: .95rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lb-date  { font-size: .72rem; color: var(--text-muted); margin-top: 1px; }

        .lb-score {
            font-weight: 900;
            font-size: 1rem;
            color: var(--primary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Empty state */
        .lb-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 32px 0;
            font-size: .9rem;
        }
        .lb-empty-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* Bottoni */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            font-family: inherit;
            font-size: .95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            border: none;
            border-radius: var(--r-md);
            cursor: pointer;
            transition: transform .15s, box-shadow .15s, filter .15s;
            user-select: none;
            width: 100%;
        }
        .btn:active { transform: scale(.96); }

        .btn-primary {
            background: var(--accent);
            color: var(--primary);
            box-shadow: 0 4px 0 var(--accent-dark), 0 6px 16px rgba(247,201,72,.3);
            margin-bottom: 10px;
        }
        .btn-primary:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            box-shadow: 0 2px 0 var(--accent-dark);
            transform: translateY(2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-muted);
            border: 2px solid var(--border);
            font-weight: 700;
        }
        .btn-outline:hover { border-color: var(--text-muted); background: var(--surface-2); }

        /* Responsive */
        @media (max-width: 480px) {
            .lb-card { padding: 28px 18px; }
            .lb-stats { gap: 8px; }
        }
    </style>
</head>
<body>

<div class="lb-card">
    <div class="lb-header">
        <span class="lb-emoji">🏆</span>
        <h1 class="lb-title">Classifica</h1>
        <p class="lb-sub">I migliori punteggi su questo dispositivo</p>
    </div>

    <!-- Stats riassuntive -->
    <div class="lb-stats">
        <div class="lb-stat">
            <div class="lb-stat-val" id="stat-partite">0</div>
            <div class="lb-stat-lbl">Partite</div>
        </div>
        <div class="lb-stat">
            <div class="lb-stat-val" id="stat-record">0</div>
            <div class="lb-stat-lbl">Record</div>
        </div>
        <div class="lb-stat">
            <div class="lb-stat-val" id="stat-media">0</div>
            <div class="lb-stat-lbl">Media</div>
        </div>
    </div>

    <!-- Lista classifica -->
    <ul class="lb-list" id="lb-list"></ul>

    <!-- Bottoni -->
    <button class="btn btn-primary" onclick="window.location.href='index.html'">
        🎯 Gioca di nuovo
    </button>
    <button class="btn btn-outline" id="btn-reset">
        🗑️ Azzera classifica
    </button>
</div>

<script>
const STORAGE_KEY  = 'logoQuizSporcle';
const TOTAL_BRANDS = 20;  // aggiorna se cambi il numero di brand nel quiz

function loadBoard() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
    const board  = loadBoard();
    const medals = ['🥇','🥈','🥉'];
    const lbList = document.getElementById('lb-list');

    /* Stats */
    document.getElementById('stat-partite').textContent = board.length;
    document.getElementById('stat-record').textContent  = board.length ? board[0].score : 0;
    document.getElementById('stat-media').textContent   = board.length
        ? Math.round(board.reduce((s, e) => s + e.score, 0) / board.length)
        : 0;

    if (!board.length) {
        lbList.innerHTML = `
            <li class="lb-empty">
                <span class="lb-empty-icon">🎮</span>
                Nessuna partita ancora.<br>Gioca e torna qui per vedere la classifica!
            </li>`;
        return;
    }

    const topClasses = ['top-1','top-2','top-3'];

    lbList.innerHTML = board.map((e, i) => `
        <li class="lb-item ${i < 3 ? topClasses[i] : ''}">
            <span class="lb-rank">${i < 3 ? medals[i] : i + 1}</span>
            <div class="lb-info">
                <div class="lb-name">${esc(e.name)}</div>
                <div class="lb-date">${esc(e.date)}</div>
            </div>
            <span class="lb-score">${e.score} / ${TOTAL_BRANDS}</span>
        </li>
    `).join('');
}

document.getElementById('btn-reset').addEventListener('click', () => {
    if (confirm('Sei sicuro di voler azzerare tutta la classifica?')) {
        localStorage.removeItem(STORAGE_KEY);
        render();
    }
});

render();
</script>
</body>
</html>
